services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_USER=gateway_user
      - DB_PASSWORD=gateway_pass
      - DB_NAME=gateway_db
    depends_on:
      - postgres

  postgres:
    image: postgres:15
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=gateway_user
      - POSTGRES_PASSWORD=gateway_pass
      - POSTGRES_DB=gateway_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: